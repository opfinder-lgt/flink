<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Flink</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #FFFFFF;
  --bg2:        #F8F8F8;
  --bg3:        #F0F0F0;
  --surface:    #F4F5FF;
  --border:     rgba(8,8,8,0.09);
  --border2:    rgba(8,8,8,0.15);
  --text:       #080808;
  --text2:      #5A5A5A;
  --text3:      #A0A0A0;
  --accent:     #0047FF;
  --accent-l:   #E8EEFF;
  --accent-d:   #0028AA;
  --accent-glow:rgba(0,71,255,0.09);
  --alert:      #E83500;

  --health:     #E8294A;
  --invest:     #009E76;
  --learning:   #C98A00;
  --home:       #2BA87A;
  --adminp:     #5566E8;
  --admins:     #8B6FE8;
  --returns:    #D96A1A;
  --numeri:     #D94040;
  --opfinder:   #0EA5D6;
  --tech:       #C044D8;
  --residents:  #B89600;
  --friends:    #D43F8C;
  --braindump:  #6B7280;

  --r:    10px;
  --rs:   6px;
  --font: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --mono: 'SF Mono', 'Fira Code', Menlo, monospace;
}

html.dark {
  --bg:         #0A0A0A;
  --bg2:        #111111;
  --bg3:        #1C1C1C;
  --surface:    #0D1530;
  --border:     rgba(255,255,255,0.08);
  --border2:    rgba(255,255,255,0.13);
  --text:       #F0EEE8;
  --text2:      #909090;
  --text3:      #525252;
  --accent:     #4D7FFF;
  --accent-l:   #0D1530;
  --accent-d:   #93AEFF;
  --accent-glow:rgba(77,127,255,0.12);
  --alert:      #FF8055;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}
body { display: flex; flex-direction: column; min-height: 100vh; }

/* smooth theme transitions */
body, .statusbar, .mode-toggle, .task-input, .board-btn,
.transcript-box, .summary-item, .settings-panel, .icon-btn,
.record-btn, .cat-btn, #changelogPanel {
  transition: background 0.25s, border-color 0.2s, color 0.2s;
}

/* ── APP SHELL ── */
.app {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  padding: 24px 32px 96px;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
}
.brand { display: flex; align-items: center; gap: 9px; }
.brand-logo {
  width: 30px; height: 30px;
  background: var(--accent); border-radius: var(--rs);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff; letter-spacing: -1px;
}
.brand-name { font-size: 24px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); }
.brand-name span { color: var(--accent); }

.header-right { display: flex; align-items: center; gap: 7px; }

.mode-toggle {
  display: flex;
  background: var(--bg3);
  border-radius: var(--r);
  padding: 3px;
  border: 1px solid var(--border2);
}
.mode-btn {
  padding: 6px 14px;
  border-radius: 8px; border: none;
  background: transparent; color: var(--text3);
  font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.1px;
}
.mode-btn.active { background: var(--accent); color: #fff; }

.icon-btn {
  width: 32px; height: 32px;
  border-radius: var(--r);
  border: 1px solid var(--border2);
  background: var(--bg); color: var(--text2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: background 0.15s, color 0.15s;
}
.icon-btn:hover { background: var(--bg3); color: var(--text); }

/* ── GREETING ── */
.greeting { margin-bottom: 44px; }
.greeting-date {
  font-size: 13px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
  font-family: var(--mono);
}
.greeting-text {
  font-size: 33px;
  font-weight: 700; color: var(--text); letter-spacing: -0.6px;
}
.greeting-text .accent { color: var(--accent); }

/* ── TEXT MODE — vertical stack ── */
#text-mode  { }
#voice-mode { display: none; }

/* ── BOARD ── */
.board-wrap { display: flex; gap: 6px; margin-bottom: 14px; }
.board-btn {
  padding: 7px 14px;
  border-radius: var(--rs);
  border: 1px solid var(--border2);
  background: var(--bg); color: var(--text2);
  font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: 0.3px; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.board-btn:hover { color: var(--text); border-color: var(--accent); }
.board-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── SINGLE-LINE INPUT ── */
.input-wrap { margin-bottom: 48px; }
.task-input {
  width: 100%;
  padding: 10px 0;
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--border2);
  border-radius: 0;
  color: var(--text);
  font-family: var(--font); font-size: 46px; font-weight: 400;
  outline: none;
  transition: border-color 0.2s;
  line-height: 1;
  -webkit-appearance: none;
}
.task-input::placeholder { color: var(--text3); }
.task-input:focus {
  border-bottom-color: var(--accent);
  box-shadow: none;
}

/* ── GRID LABEL ── */
.grid-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
  font-family: var(--mono);
}

/* ── CATEGORY GRID ── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

/* ── CATEGORY BUTTON — bigger icon + text ── */
.cat-btn {
  position: relative;
  border: 1px solid var(--border2);
  border-left-width: 3px;
  border-radius: var(--r);
  padding: 0 16px 0 56px;   /* left space for icon */
  min-height: 64px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font); font-size: 15px; font-weight: 600;
  color: var(--text);
  background: var(--bg);
  text-align: center;
  letter-spacing: 0.05px;
  transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s, background 0.2s;
  overflow: hidden;
}
.cat-emoji {
  position: absolute;
  left: 14px;
  font-size: 26px;
  line-height: 1;
  flex-shrink: 0;
}
.cat-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
.cat-btn:active { transform: scale(0.97); }
.cat-btn.sending { opacity: 0.45; pointer-events: none; }
.cat-btn.success-flash { animation: flashSuccess 0.5s ease; }

/* Category colours — tinted bg + coloured left border */
.cat-btn[data-cat="Health"]                { border-left-color: var(--health);    background: rgba(232,41,74,0.06); }
.cat-btn[data-cat="Investments"]           { border-left-color: var(--invest);    background: rgba(0,158,118,0.06); }
.cat-btn[data-cat="Personal Learning"]     { border-left-color: var(--learning);  background: rgba(201,138,0,0.06); }
.cat-btn[data-cat="Home"]                  { border-left-color: var(--home);      background: rgba(43,168,122,0.06); }
.cat-btn[data-cat="Admin Personal"]        { border-left-color: var(--adminp);    background: rgba(85,102,232,0.06); }
.cat-btn[data-cat="Admin Shared"]          { border-left-color: var(--admins);    background: rgba(139,111,232,0.06); }
.cat-btn[data-cat="Returns"]               { border-left-color: var(--returns);   background: rgba(217,106,26,0.06); }
.cat-btn[data-cat="numeri.ch"]             { border-left-color: var(--numeri);    background: rgba(217,64,64,0.06); }
.cat-btn[data-cat="öpfinder"]              { border-left-color: var(--opfinder);  background: rgba(14,165,214,0.06); }
.cat-btn[data-cat="Tech Projects"]         { border-left-color: var(--tech);      background: rgba(192,68,216,0.06); }
.cat-btn[data-cat="Residents Association"] { border-left-color: var(--residents); background: rgba(184,150,0,0.06); }
.cat-btn[data-cat="Friends & Family"]      { border-left-color: var(--friends);   background: rgba(212,63,140,0.06); }

/* Dark mode — slightly stronger tint */
html.dark .cat-btn[data-cat="Health"]                { background: rgba(232,41,74,0.10); }
html.dark .cat-btn[data-cat="Investments"]           { background: rgba(0,158,118,0.10); }
html.dark .cat-btn[data-cat="Personal Learning"]     { background: rgba(201,138,0,0.10); }
html.dark .cat-btn[data-cat="Home"]                  { background: rgba(43,168,122,0.10); }
html.dark .cat-btn[data-cat="Admin Personal"]        { background: rgba(85,102,232,0.10); }
html.dark .cat-btn[data-cat="Admin Shared"]          { background: rgba(139,111,232,0.10); }
html.dark .cat-btn[data-cat="Returns"]               { background: rgba(217,106,26,0.10); }
html.dark .cat-btn[data-cat="numeri.ch"]             { background: rgba(217,64,64,0.10); }
html.dark .cat-btn[data-cat="öpfinder"]              { background: rgba(14,165,214,0.10); }
html.dark .cat-btn[data-cat="Tech Projects"]         { background: rgba(192,68,216,0.10); }
html.dark .cat-btn[data-cat="Residents Association"] { background: rgba(184,150,0,0.10); }
html.dark .cat-btn[data-cat="Friends & Family"]      { background: rgba(212,63,140,0.10); }

/* Braindump — full-width spacebar */
.cat-btn.braindump {
  grid-column: 1 / -1;
  min-height: 64px;
  padding: 0 16px 0 56px;
  border-left-color: var(--braindump);
  background: var(--bg3);
  font-size: 16px; font-weight: 700;
  justify-content: center;
}
html.dark .cat-btn.braindump { background: var(--bg3); }
.cat-btn.braindump .cat-emoji { font-size: 26px; }

/* ── VOICE MODE ── */
.voice-container {
  display: flex; flex-direction: column;
  align-items: center; padding: 40px 0;
  max-width: 520px; margin: 0 auto;
}
.voice-title {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  font-family: var(--mono);
}
.voice-subtitle {
  font-size: 14px; color: var(--text2);
  text-align: center; max-width: 300px;
  line-height: 1.6; margin-bottom: 44px;
}
.voice-subtitle strong { color: var(--text); }

.record-btn {
  width: 130px; height: 130px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: var(--bg); cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; position: relative;
  transition: transform 0.2s, border-color 0.2s;
  box-shadow: 0 2px 20px rgba(0,0,0,0.07);
}
.record-btn::before {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  background: conic-gradient(var(--accent) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.record-btn.recording { border-color: var(--accent); }
.record-btn.recording::before { opacity: 1; animation: spin 2s linear infinite; }
.record-btn:hover { transform: scale(1.03); border-color: var(--accent); }
.record-btn:active { transform: scale(0.97); }
.record-inner {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 5px;
}
.record-icon { font-size: 38px; transition: all 0.3s; }
.record-label {
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
  font-family: var(--mono); transition: color 0.3s;
}
.record-btn.recording .record-label { color: var(--accent); }

.transcript-box {
  width: 100%; margin-top: 32px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 14px 16px; display: none;
}
.transcript-box.visible { display: block; }
.transcript-label {
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 7px;
  font-family: var(--mono);
}
.transcript-text { font-size: 14px; color: var(--text); line-height: 1.7; margin-bottom: 10px; }
.transcript-processing {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; color: var(--accent); font-family: var(--mono);
}

.voice-summary { width: 100%; margin-top: 12px; display: none; }
.voice-summary.visible { display: block; }
.summary-title {
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
  font-family: var(--mono);
}
.summary-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--rs); margin-bottom: 5px;
  background: var(--bg2); border: 1px solid var(--border);
  font-size: 13px;
}
.summary-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.summary-task { flex: 1; color: var(--text); }
.summary-cat { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; color: var(--text3); font-family: var(--mono); }
.summary-status { font-size: 13px; }

/* ── STATUS BAR ── */
.statusbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--border2);
  padding: 8px 28px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 500; transition: background 0.25s, border-color 0.2s;
}
.status-left { min-width: 160px; }
.status-label {
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
  font-family: var(--mono); margin-bottom: 2px;
}
.status-value {
  font-size: 13px; font-weight: 600; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
}
.status-weather {
  flex: 1; text-align: center;
  font-size: 13px; color: var(--text2); font-family: var(--mono);
}
.status-clocks { display: flex; gap: 24px; align-items: center; }
.clock-item { text-align: right; }
.clock-city {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text3); font-family: var(--mono);
}
.clock-time {
  font-size: 15px; font-weight: 700; color: var(--text);
  font-family: var(--mono); letter-spacing: 0.5px;
}

/* ── SETTINGS ── */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(3px);
  z-index: 800; display: none;
}
.settings-overlay.open { display: block; }
.settings-panel {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 14px; padding: 22px;
  width: min(370px, 92vw); z-index: 900; display: none;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
}
.settings-panel.open { display: block; }
.settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.settings-header h3 { font-size: 14px; font-weight: 700; }
.settings-close {
  width: 26px; height: 26px; border-radius: var(--rs);
  border: 1px solid var(--border2); background: var(--bg2);
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.settings-close:hover { color: var(--text); }
.settings-field { margin-bottom: 13px; }
.settings-field label {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text3); display: block;
  margin-bottom: 5px; font-family: var(--mono);
}
.settings-field input {
  width: 100%; padding: 8px 11px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--rs); color: var(--text);
  font-family: var(--mono); font-size: 11px; outline: none;
  transition: border-color 0.15s;
}
.settings-field input:focus { border-color: var(--accent); }
.save-btn {
  width: 100%; padding: 9px;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--rs); font-family: var(--font);
  font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background 0.15s; margin-top: 2px;
}
.save-btn:hover { background: var(--accent-d); }

/* ── TOAST — bottom right ── */
.toast-container {
  position: fixed; bottom: 74px; right: 20px;
  z-index: 1000; display: flex; flex-direction: column-reverse;
  gap: 7px; pointer-events: none;
}
.toast {
  padding: 9px 16px; border-radius: 40px;
  font-size: 12px; font-weight: 600; white-space: nowrap;
  animation: toastIn 0.22s ease both; pointer-events: none;
}
.toast.success { background: var(--accent); color: #fff; }
.toast.error   { background: var(--alert); color: #fff; }
.toast.info    { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.toast.out     { animation: toastOut 0.2s ease forwards; }

/* ── DOTS ── */
.dots { display: inline-flex; gap: 3px; align-items: center; }
.dots span {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--accent); animation: dotBounce 1.2s infinite ease-in-out;
}
.dots span:nth-child(2) { animation-delay: 0.15s; }
.dots span:nth-child(3) { animation-delay: 0.3s; }

/* ── ANIMATIONS ── */
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes flashSuccess {
  0%   { filter: brightness(1); }
  35%  { filter: brightness(1.25); }
  100% { filter: brightness(1); }
}
@keyframes toastIn  { from { opacity: 0; transform: translateY(6px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { to   { opacity: 0; transform: translateY(6px) scale(0.95); } }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40%           { transform: scale(1);   opacity: 1; }
}

/* ── RESPONSIVE — tablet ── */
@media (max-width: 860px) {
  .app { padding: 20px 22px 88px; }
  .cat-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── RESPONSIVE — mobile ── */
@media (max-width: 600px) {
  .app { padding: 16px 14px 84px; }
  .greeting-text { font-size: 28px; }
  .greeting-date { font-size: 11px; }
  .task-input { font-size: 26px; padding: 8px 0; }
  .cat-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .cat-btn { min-height: 64px; font-size: 14px; padding: 0 10px 0 50px; }
  .cat-emoji { font-size: 24px; left: 13px; }
  .cat-btn.braindump { min-height: 68px; font-size: 15px; padding: 0 10px 0 50px; }
  .board-btn { font-size: 13px; padding: 8px 14px; }
  .status-weather { display: none; }
  .record-btn { width: 116px; height: 116px; }
  .record-icon { font-size: 34px; }
  .mode-btn { font-size: 13px; padding: 7px 14px; }
  .brand-name { font-size: 19px; }
  .clock-time { font-size: 13px; }
  .status-value { font-size: 12px; max-width: 160px; }
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h3>Settings</h3>
    <button class="settings-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="settings-field">
    <label>Worker URL</label>
    <input type="text" id="workerUrlInput" placeholder="https://your-worker.workers.dev" />
  </div>
  <button class="save-btn" onclick="saveSettings()">Save</button>
  <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;">
    <button onclick="openChangelog()" style="font-size:10px;font-family:var(--mono);color:var(--accent);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;">v2.4.0</button>
    <span style="font-size:10px;font-family:var(--mono);color:var(--text3);">2026-04-02 BST</span>
  </div>
</div>

<!-- CHANGELOG -->
<div class="settings-overlay" id="changelogOverlay" onclick="closeChangelog()" style="display:none;z-index:850;"></div>
<div id="changelogPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);border:1px solid var(--border2);border-radius:14px;padding:22px;width:min(450px,92vw);z-index:950;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.12);transition:background 0.25s;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h3 style="font-size:14px;font-weight:700;">Changelog</h3>

// ─── WEATHER ──────────────────────────────────────────────────
async function fetchWeather() {
  try {
    const res = await fetch("https://wttr.in/London?format=j1");
    if (!res.ok) return;
    const d  = await res.json();
    const cc = d.current_condition[0];
    const tempC = cc.temp_C;
    const desc  = cc.weatherDesc[0].value;
    const emoji = weatherEmoji(desc);

    // Sunset from today's astronomy data
    let sunsetStr = "";
    try {
      const rawSunset = d.weather[0].astronomy[0].sunset; // e.g. "08:22 PM"
      sunsetStr = " · 🌇 " + to24h(rawSunset);
    } catch(e) {}

    document.getElementById("weatherDisplay").textContent =
      emoji + " " + tempC + "°C · London" + sunsetStr;
  } catch(e) {}
}

function to24h(str) {
  // Convert "08:22 PM" → "20:22"
  const m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return str;
  let h = parseInt(m[1], 10);
  const min = m[2];
  const period = m[3].toUpperCase();
  if (period === "PM" && h !== 12) h += 12;
  if (period === "AM" && h === 12) h = 0;
  return h.toString().padStart(2,"0") + ":" + min;
}

function weatherEmoji(desc) {
  const d = desc.toLowerCase();
  if (d.includes("sunny") || d.includes("clear"))                          return "☀️";
  if (d.includes("partly"))                                                 return "⛅";
  if (d.includes("overcast") || d.includes("cloudy"))                      return "☁️";
  if (d.includes("thunder") || d.includes("storm"))                        return "⛈️";
  if (d.includes("snow") || d.includes("blizzard"))                        return "❄️";
  if (d.includes("sleet") || d.includes("ice"))                            return "🌨️";
  if (d.includes("rain") || d.includes("drizzle") || d.includes("shower")) return "🌧️";
  if (d.includes("fog") || d.includes("mist") || d.includes("haze"))      return "🌫️";
  if (d.includes("wind"))                                                   return "💨";
  return "🌤️";
}

// ─── POST TO BLITZIT ──────────────────────────────────────────
async function postToBlitzit(title, category, board = "backlog") {
  const url = localStorage.getItem("workerUrl") || DEFAULT_WORKER;
  const res  = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "create", title, board,
      id:     "flink-" + Date.now() + "-" + Math.random().toString(36).slice(2,7),
      source: "Flink", category
    })
  });
  if (!res.ok) throw new Error("Worker " + res.status);
  return res;
}

// ─── SHARED PIPELINE ──────────────────────────────────────────
async function runPipeline(audioBlob, onStep) {
  const url = localStorage.getItem("workerUrl") || DEFAULT_WORKER;

  onStep("transcribe", "loading", null);
  let transcript;
  try {
    const fd = new FormData();
    fd.append("file", new File([audioBlob], "audio.webm", { type: audioBlob.type || "audio/webm" }));
    const res = await fetch(url, { method: "POST", headers: { "X-Action": "transcribe" }, body: fd });
    if (!res.ok) { onStep("transcribe", "error", "HTTP " + res.status); throw new Error("transcribe_failed"); }
    transcript = (await res.text()).trim();
    if (!transcript) { onStep("transcribe", "error", "No speech detected"); throw new Error("no_speech"); }
    onStep("transcribe", "done", transcript);
  } catch(e) {
    if (e.message !== "transcribe_failed" && e.message !== "no_speech") onStep("transcribe", "error", e.message);
    throw e;
  }

  onStep("categorise", "loading", null);
  let tasks, board;
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Action": "categorise" },
      body: JSON.stringify({ transcript })
    });
    if (!res.ok) { onStep("categorise", "error", "HTTP " + res.status); throw new Error("categorise_failed"); }
    let raw = (await res.text()).trim().replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/,"").trim();
    const m = raw.match(/\{[\s\S]*\}/); if (m) raw = m[0];
    const parsed = JSON.parse(raw);
    board = parsed.board || "backlog";
    tasks = parsed.tasks || [];
    onStep("categorise", "done", parsed);
  } catch(e) {
    if (e.message !== "categorise_failed") onStep("categorise", "error", e.message);
    throw e;
  }

  if (!tasks.length) { onStep("blitzit", "error", "No tasks extracted"); return []; }

  onStep("blitzit", "loading", null);
  const results = [];
  await Promise.all(tasks.map(async t => {
    try { await postToBlitzit(t.title, t.category, board); results.push({ ...t, ok: true }); }
    catch { results.push({ ...t, ok: false }); }
  }));
  onStep("blitzit", "done", results);
  return results;
}

// ─── VOICE MODE ───────────────────────────────────────────────
function toggleRecord() { if (isRecording) stopRecording(); else startRecording(); }

async function startRecording() {
  try {
    const stream  = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks   = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = processVoice;
    mediaRecorder.start();
    isRecording = true;
    document.getElementById("recordBtn").classList.add("recording");
    document.getElementById("recordIcon").textContent  = "⏹";
    document.getElementById("recordLabel").textContent = "tap to stop";
    document.getElementById("voiceSummary").classList.remove("visible");
    document.getElementById("transcriptBox").classList.remove("visible");
    document.getElementById("summaryItems").innerHTML = "";
  } catch(err) { showToast("Mic access denied", "error"); }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  isRecording = false;
  document.getElementById("recordBtn").classList.remove("recording");
  document.getElementById("recordIcon").textContent  = "⏳";
  document.getElementById("recordLabel").textContent = "processing…";
}

async function processVoice() {
  const blob = new Blob(audioChunks, { type: mediaRecorder?.mimeType || "audio/webm" });
  document.getElementById("transcriptBox").classList.add("visible");
  document.getElementById("transcriptText").textContent        = "Transcribing…";
  document.getElementById("processingIndicator").style.display = "flex";
  try {
    await runPipeline(blob, (step, status, data) => {
      if (step === "transcribe") {
        if (status === "done")  document.getElementById("transcriptText").textContent = data;
        if (status === "error") {
          document.getElementById("transcriptText").textContent = "Error: " + data;
          document.getElementById("processingIndicator").style.display = "none";
          showToast("Transcription failed", "error");
        }
      }
      if (step === "categorise" && status === "error") {
        document.getElementById("processingIndicator").style.display = "none";
        showToast("Categorisation failed", "error");
      }
      if (step === "blitzit") {
        document.getElementById("processingIndicator").style.display = "none";
        if (status === "done" && Array.isArray(data)) showVoiceSummary(data);
        else if (status === "error") showToast(data, "error");
      }
    });
  } catch(err) {
    console.error(err);
    document.getElementById("processingIndicator").style.display = "none";
  }
  resetRecordBtn();
}

function showVoiceSummary(results) {
  const itemsEl = document.getElementById("summaryItems");
  itemsEl.innerHTML = "";
  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "summary-item";
    const color = CAT_COLORS[r.category] || "#6B7280";
    div.innerHTML = `<div class="summary-dot" style="background:${color}"></div><div class="summary-task">${r.title}</div><div class="summary-cat">${r.category}</div><div class="summary-status">${r.ok?"✓":"✗"}</div>`;
    itemsEl.appendChild(div);
  });
  document.getElementById("voiceSummary").classList.add("visible");
  const ok = results.filter(r => r.ok).length;
  setLastTask(`${ok}/${results.length} tasks sent via voice`);
  showToast(`✓ ${ok} task${ok !== 1?"s":""} sent`, "success");
}

function resetRecordBtn() {
  document.getElementById("recordIcon").textContent  = "🎙";
  document.getElementById("recordLabel").textContent = "tap to record";

function saveSettings() {
  const w = document.getElementById("workerUrlInput").value.trim();
  if (w) localStorage.setItem("workerUrl", w);
  closeSettings();
  showToast("Settings saved", "success");
}

// ─── CHANGELOG ────────────────────────────────────────────────
function openChangelog() {
  document.getElementById("changelogContent").innerHTML = CHANGELOG.map(e => `
    <div style="margin-bottom:18px;">
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:7px;">
        <span style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--accent);">v${e.v}</span>
        <span style="font-size:10px;color:var(--text3);font-family:var(--mono);">${e.date}</span>
      </div>
      <ul style="list-style:none;padding:0;margin:0;">
        ${e.notes.map(n=>`<li style="font-size:12px;color:var(--text2);padding:3px 0 3px 12px;position:relative;line-height:1.5;"><span style="position:absolute;left:0;color:var(--accent);">·</span>${n}</li>`).join("")}
      </ul>
    </div>
  `).join('<div style="height:1px;background:var(--border2);margin-bottom:18px;"></div>');
  document.getElementById("changelogOverlay").style.display = "block";
  document.getElementById("changelogPanel").style.display   = "block";
  closeSettings();
}
function closeChangelog() {
  document.getElementById("changelogOverlay").style.display = "none";
  document.getElementById("changelogPanel").style.display   = "none";
}

// ─── TOAST ────────────────────────────────────────────────────
function showToast(msg, type = "info", duration = 2600) {
  const c = document.getElementById("toastContainer");
  const t = document.createElement("div");
  t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.classList.add("out"); setTimeout(() => t.remove(), 220); }, duration);
}
</script>
